<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ron's Pizza | Backoffice</title>
  <script>
    (function () {
      var path = window.location.pathname || '';
      var marker = '/backoffice';
      var index = path.indexOf(marker);
      var basePath = index >= 0 ? path.slice(0, index + marker.length) : marker;
      if (!basePath.endsWith('/')) basePath += '/';
      document.write('<base href="' + basePath + '">');
    })();
  </script>
  <link rel="stylesheet" href="./styles.css?v=20260327-5">
</head>
<body>
  <div id="login-screen" class="screen screen-login">
    <div class="login-card">
      <h1>Backoffice Ron's Pizza</h1>
      <p>Accede con PIN y sucursal para administrar el sistema.</p>
      <form id="login-form">
        <label for="sucursal_id">Sucursal ID</label>
        <input id="sucursal_id" name="sucursal_id" type="number" min="1" value="1" required>

        <label for="pin">PIN</label>
        <input id="pin" name="pin" type="password" placeholder="1234" required>

        <button type="submit">Iniciar sesión</button>
      </form>
      <div id="login-status" class="status"></div>
    </div>
  </div>

  <div id="app-screen" class="screen screen-app hidden">
    <aside class="sidebar">
      <div class="brand">
        <h2>Ron's Pizza</h2>
        <span>Backoffice</span>
      </div>
      <nav id="module-nav" class="module-nav"></nav>
      <button id="logout-btn" class="logout-btn">Cerrar sesión</button>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="module-title">Reportes</h1>
          <p id="module-subtitle">Ventas</p>
        </div>
        <div id="session-badge" class="session-badge"></div>
      </header>
      <section id="module-content" class="module-content"></section>
    </main>
  </div>

  <template id="loading-template">
    <div class="loading">Cargando...</div>
  </template>

  <script src="./app.js?v=20260327-11"></script>
</body>
</html>
