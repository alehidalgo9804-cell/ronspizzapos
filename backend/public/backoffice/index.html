<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backoffice - Rons Pizza</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="login-page">
  <div class="login-card">
    <h1>Rons Pizza</h1>
    <p class="subtitle">Backoffice Administrativo</p>
    <form id="login-form" autocomplete="off">
      <div class="form-group">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" class="form-control" placeholder="admin" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" class="form-control" placeholder="••••••" required>
      </div>
      <button type="submit" class="btn btn-primary w-100" id="btn-login">Entrar</button>
    </form>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script>
    const form = document.getElementById('login-form');
    const btn = document.getElementById('btn-login');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      setLoading(btn, true);
      const res = await login(document.getElementById('usuario').value, document.getElementById('password').value);
      setLoading(btn, false);
      if (res.success) {
        window.location.href = './dashboard.html';
      } else {
        toast(res.message, 'error');
      }
    });
  </script>
</body>
</html>
